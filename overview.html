<style>
:root{
  --gold:#b8986a;--gold-light:#d4b896;--gold-pale:#f5ede0;
  --dark:#1a1510;--mid:#3d3020;--text:#2c2416;--muted:#8a7a65;
  --bg:#faf7f2;--white:#fff;--border:#e8ddd0;
  --bride-bg:#fef4f6;  --bride-c:#c47a8a;
  --groom-bg:#f2f5fc;  --groom-c:#6a8fb5;
  --gold-bg:#f5ede0;   --gold-c:#b8986a;
  --teal-bg:#f2f8f7;   --teal-c:#5a9ea0;
  --sage-bg:#f5f7f2;   --sage-c:#7a9e7e;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);}

/* ── HEADER ── */
.hdr{background:var(--dark);padding:16px 28px 14px;text-align:center;position:relative;overflow:hidden;}
.hdr::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(184,152,106,.18),transparent 70%);}
.hdr-orn{position:relative;font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:5px;color:var(--gold);text-transform:uppercase;opacity:.8;margin-bottom:3px;}
.hdr h1{position:relative;font-family:'Cormorant Garamond',serif;font-size:clamp(22px,3.5vw,36px);font-weight:300;color:#fff;letter-spacing:1px;}
.hdr h1 em{font-style:italic;color:var(--gold-light);}
.hdr-sub{position:relative;font-size:11px;color:var(--gold-light);letter-spacing:3px;text-transform:uppercase;margin-top:3px;font-weight:300;}

/* ── PHASE WRAPPER ── */
.phase{max-width:1080px;margin:0 auto;padding:0 20px 48px;}
.phase-hd{padding:28px 0 8px;margin-bottom:4px;}
.phase-num{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:500;}
.phase-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;color:var(--dark);margin:2px 0;}
.phase-sub{font-size:11.5px;color:var(--muted);line-height:1.5;}
.phase-divider{height:2px;background:linear-gradient(to right,var(--dark),transparent);margin-bottom:14px;}

/* ── TIMELINE TABLE — time-scaled, flush rows ── */
.trow{display:flex;align-items:stretch;border-bottom:1px solid var(--border);}
.trow:last-child{border-bottom:none;}

.tt{flex-shrink:0;width:52px;padding:7px 8px 4px 0;text-align:right;
  font-size:11.5px;font-weight:600;color:var(--muted);letter-spacing:.3px;
  border-right:2px solid var(--border);background:var(--bg);}

/* inner grid — columns set via inline style per phase */
.tinner{flex:1;display:grid;gap:0;padding:0;align-items:stretch;}
.tinner > div{border-left:1px solid var(--border);}
.tinner > .span-all{border-left:none;}

/* COLUMN HEADER ROW */
.col-header-row{display:flex;align-items:stretch;margin-bottom:0;border-bottom:2px solid var(--border);}
.ch-spacer{flex-shrink:0;width:52px;border-right:2px solid var(--border);background:var(--bg);}
.ch-grid{flex:1;display:grid;gap:0;}
.ch{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:1px;
  padding:6px 10px;border-radius:0;text-align:center;line-height:1.3;
  border-left:1px solid var(--border);}
.ch:first-child{border-left:none;}
.ch.bride{background:var(--bride-bg);color:var(--bride-c);}
.ch.groom{background:var(--groom-bg);color:var(--groom-c);}
.ch.couple{background:var(--gold-bg);color:var(--gold-c);}
.ch.bm{background:#fef8f9;color:#c08090;}
.ch.gm{background:#f5f7fd;color:#7a9ab8;}
.ch.vendor{background:var(--teal-bg);color:var(--teal-c);}
.ch.prog{background:var(--sage-bg);color:var(--sage-c);}

/* ── CARDS — flat table cells ── */
.card{border-radius:0;border:none;padding:7px 11px 8px 13px;position:relative;overflow:hidden;box-sizing:border-box;transition:filter .12s;}
.card:hover{filter:brightness(.97);}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;}
.card.bride{background:var(--bride-bg);}.card.bride::before{background:var(--bride-c);}
.card.groom{background:var(--groom-bg);}.card.groom::before{background:var(--groom-c);}
.card.couple,.card.joint{background:var(--gold-bg);}.card.couple::before,.card.joint::before{background:var(--gold-c);}
.card.bm{background:#fef8f9;}.card.bm::before{background:#c49098;}
.card.gm{background:#f5f7fd;}.card.gm::before{background:#7a9ec8;}
.card.vendor{background:var(--teal-bg);}.card.vendor::before{background:var(--teal-c);}
.card.prog{background:var(--sage-bg);}.card.prog::before{background:var(--sage-c);}

.c-badge{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px;}
.c-title{font-size:13px;font-weight:500;color:var(--dark);line-height:1.3;margin-bottom:4px;}
.c-info{display:flex;flex-wrap:wrap;gap:2px 10px;}
.c-info span{font-size:11px;color:var(--muted);}
.c-who{font-size:10.5px;color:var(--mid);margin-top:3px;}
.c-vendor{font-size:11px;color:#8a6020;font-weight:500;margin-top:3px;}
.c-pic{font-size:10.5px;color:var(--muted);margin-top:2px;}
.c-note{font-size:10.5px;color:var(--muted);font-style:italic;margin-top:4px;
  padding-top:4px;border-top:1px dashed var(--border);}

/* span all cols inside inner grid */
.span-all{grid-column:1/-1;}

/* ── MOBILE: horizontal scroll, don't squeeze columns ── */
#root {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.phase {
  min-width: 680px;
}

  /* ── Alternating event colours — every other event in same column flips shade ── */
  :root {
    --bride-bg2:  #f5dde5;
    --groom-bg2:  #dce5f5;
    --gold-bg2:   #ecdcca;
    --bm-bg2:     #f5e2e7;
    --gm-bg2:     #e0e8f6;
    --teal-bg2:   #d8eeeb;
    --sage-bg2:   #e4e8dc;
  }
  .card.bride.alt   { background: var(--bride-bg2); }
  .card.groom.alt   { background: var(--groom-bg2); }
  .card.couple.alt,
  .card.joint.alt   { background: var(--gold-bg2);  }
  .card.bm.alt      { background: var(--bm-bg2);    }
  .card.gm.alt      { background: var(--gm-bg2);    }
  .card.vendor.alt  { background: var(--teal-bg2);  }
  .card.prog.alt    { background: var(--sage-bg2);  }
</style>
</head>

 "agenda": "#7 dessert", "logistics": "", "notes": "", "vendor": "", "vendor_contact": "", "pic1": "groomsman_desmond", "pic2": ""}, {"date": "2026-07-05", "start": "15:30", "end": "16:00", "venue": "St Regis - banquet", "type": "admin", "group": "", "agenda": "clear venue", "logistics": "", "notes": "", "vendor": "", "vendor_contact": "", "pic1": "", "pic2": ""}];

const TE={prep:'📦',makeup:'💄',travel:'🚗',setup:'🔧',ceremony:'💍',
  photo:'📸',admin:'📋','check-in':'🏨',gatecrash:'🎉',station:'📌',food:'🍽️',station:'📌'};
const TL={prep:'Prep',makeup:'Makeup',travel:'Travel',setup:'Setup',
  ceremony:'Ceremony',photo:'Photo',admin:'Admin','check-in':'Check-in',
  gatecrash:'Gatecrash',station:'Station',food:'Food',station:'Station'};

const GNAME={bride:'Bride',groom:'Groom',bride_mummy:"Bride's Mum",
  bride_daddy:"Bride's Dad",bride_family:'Bride Family',groom_mummy:"Groom's Mum",
  groom_family:'Groom Family',bridesmaid:'All Bridesmaids',groomsman:'All Groomsmen'};

function fmtN(p){
  p=p.trim();
  if(GNAME[p])return GNAME[p];
  if(p.startsWith('bridesmaid_'))return p.replace('bridesmaid_','').replace(/\b\w/g,c=>c.toUpperCase());
  if(p.startsWith('groomsman_'))return p.replace('groomsman_','').replace(/\b\w/g,c=>c.toUpperCase());
  return p.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
}
function fmtGroup(g){return(g||'').split(/[,\n]/).map(p=>p.trim()).filter(Boolean).map(fmtN).join(', ');}
function gf(r){
  const ps=(r.group||'').toLowerCase().split(/[,\n]/).map(s=>s.trim()).filter(Boolean);
  const b=ps.some(p=>p==='bride'||p==='bride_mummy'||p==='bride_daddy'||p==='bride_family');
  const g=ps.some(p=>p==='groom'||p==='groom_mummy'||p==='groom_family');
  const bm=ps.some(p=>p.startsWith('bridesmaid'));
  const gm=ps.some(p=>p.startsWith('groomsman'));
  const bmN=ps.filter(p=>p.startsWith('bridesmaid')).length;
  const gmN=ps.filter(p=>p.startsWith('groomsman')).length;
  return{b,g,bm,gm,bmN,gmN,any:b||g||bm||gm};
}

// Alt shades pre-assigned by time-slot before render (see preAlt below)
const _evAlt=new Map();
function card(ev,cls){
  const alt=_evAlt.get(ev)||'';
  const who=fmtGroup(ev.group);
  const pics=[ev.pic1,ev.pic2].filter(Boolean).map(fmtN).join(', ');
  const note=ev.notes&&ev.notes.length<160?ev.notes:'';
  return`<div class="card ${cls}${alt}">
    <div class="c-badge">${TE[ev.type]||''} ${TL[ev.type]||ev.type}</div>
    <div class="c-title">${ev.agenda}</div>
    <div class="c-info">
      <span>⏱ ${ev.start}${ev.end?' – '+ev.end:''}</span>
      ${ev.venue?`<span>📍 ${ev.venue}</span>`:''}
    </div>
    ${who?`<div class="c-who">👤 ${who}</div>`:''}
    ${ev.vendor?`<div class="c-vendor">🏢 ${ev.vendor}${ev.vendor_contact?' &thinsp;·&thinsp; '+ev.vendor_contact:''}</div>`:''}
    ${pics&&pics!==who?`<div class="c-pic">PIC: ${pics}</div>`:''}
    ${note?`<div class="c-note">${note}</div>`:''}
  </div>`;
}

/* ── PHASE 1 CLASSIFIER ─────────────────────────────── */
/* cols: bride | groom | vendor   joint → spans all */
function c1(r){
  const{b,g,bm,gm}=gf(r);
  const hasBride=b||bm, hasGroom=g||gm;
  // Vendor column: setup event with vendor, or empty-group vendor
  if(r.vendor&&r.type==='setup') return'vendor';
  if(hasBride&&hasGroom) return'joint';
  if(hasBride) return'bride';
  if(hasGroom) return'groom';
  return'joint';
}

/* ── PHASE 2 CLASSIFIER ─────────────────────────────── */
/* cols: couple | bridesmaids | groomsmen | vendors */
/* returns array — event can appear in multiple cols */
function c2(r){
  const{b,g,bm,gm,bmN,gmN}=gf(r);
  // Vendor arrivals → vendor col
  const vArr=r.vendor&&(r.agenda.toLowerCase().startsWith('vendor arrival')||r.agenda.toLowerCase().includes('receive solemnizer'));
  if(vArr) return['vendor'];
  // Couple: only bride/groom names, no party
  if((b||g)&&!bm&&!gm) return['couple'];
  // Mixed bm+gm: show in both if close in count, else majority
  if(bm&&gm){
    if(Math.abs(bmN-gmN)<=1) return['bm','gm'];
    return gmN>bmN?['gm']:['bm'];
  }
  if(bm) return['bm'];
  if(gm) return['gm'];
  return['couple']; // empty group → pre-banquet flow
}

/* ── PHASE 3 CLASSIFIER ─────────────────────────────── */
/* cols: couple | program */
function c3(r){
  const{b,g,bm,gm}=gf(r);
  // "Clear venue" spans full width
  if(r.agenda.toLowerCase().includes('clear venue')) return 'span';
  // Food courses → right column
  if(r.type==='food') return 'prog';
  // Anyone with bride/groom/party → left column
  if(b||g||bm||gm) return 'couple';
  // Activities concurrent with food (bingo etc.) → left column
  if(r.type==='ceremony'||r.type==='station') return 'couple';
  return 'prog';
}

/* ── ROW BUILDER ────────────────────────────────────── */
function toMin(t){if(!t)return 0;const[hh,mm]=t.split(':').map(Number);return hh*60+mm;}
function durMin(r){
  if(!r.start||!r.end)return 30;
  const[sh,sm]=r.start.split(':').map(Number);
  const[eh,em]=r.end.split(':').map(Number);
  const d=(eh*60+em)-(sh*60+sm);
  return d>0?d:30;
}
function rowH(evs){return Math.max(Math.round(Math.max(...evs.map(durMin))*1.4),88);}

/* Colour per column — for continuation stripes.
   Keep this aligned with card/header colours so continuation cells do not look mixed up. */
const COL_CLR={bride:'#c47a8a',groom:'#6a8fb5',couple:'#b8986a',joint:'#b8986a',
  bm:'#c49098',gm:'#7a9ec8',vendor:'#5a9ea0',prog:'#7a9e7e'};

/* Events in colAllEvs that started before t and are still running */
function getRunning(colAllEvs,t){
  const tMin=toMin(t);
  return colAllEvs.filter(e=>toMin(e.start)<tMin&&e.end&&toMin(e.end)>tMin);
}

/* Render one column cell.
   - running events → 4 px coloured continuation stripe on the left
   - new events     → card indented 14 px (leaving stripe visible)          */
function colCell(newEvs,runEvs,cls){
  if(!newEvs.length&&!runEvs.length)return'<div></div>';

  // Make cells occupy the full row height. This prevents long-running items
  // from visually ending after only their text content.
  if(!runEvs.length){
    if(newEvs.length===1){
      return`<div style="height:100%;">${card(newEvs[0],cls).replace('<div class="card ', '<div style="height:100%;" class="card ')}</div>`;
    }
    return`<div style="height:100%;">${newEvs.map(ev=>card(ev,cls)).join('')}</div>`;
  }

  // Running event: continue the cell background through this whole row,
  // with a 4px stripe. New overlapping cards are indented on top of it.
  const bgCls=cls||'joint';
  const clr=COL_CLR[bgCls]||'#b8986a';
  // Carry the same alt shade as when the event's card was first rendered
  const runAlt=_evAlt.get(runEvs[0])||'';
  let s=`<div class="card ${bgCls}${runAlt}" style="height:100%;min-height:100%;position:relative;padding:0;overflow:visible;">
    <div style="position:absolute;left:0;top:0;bottom:0;width:4px;background:${clr};z-index:1;"></div>`;
  newEvs.forEach((ev,i)=>{
    s+=`<div style="position:relative;z-index:2;margin-left:${14+i*4}px;">${card(ev,cls)}</div>`;
  });
  s+='</div>';
  return s;
}

function byTime(evs){
  const m={};
  evs.forEach(e=>{(m[e.start]=m[e.start]||[]).push(e);});
  return m;
}

/* Phase 1: 3-col + joint span, with running-event continuation stripes */
function rowsP1(evs){
  const g=byTime(evs); let html='';
  // Pre-collect all events per column for running detection
  const allB=evs.filter(e=>c1(e)==='bride');
  const allG=evs.filter(e=>c1(e)==='groom');
  const allV=evs.filter(e=>c1(e)==='vendor');

  Object.keys(g).sort().forEach(t=>{
    const all=g[t];
    const brideNew=all.filter(e=>c1(e)==='bride');
    const groomNew=all.filter(e=>c1(e)==='groom');
    const vendorNew=all.filter(e=>c1(e)==='vendor');
    const joint    =all.filter(e=>c1(e)==='joint');
    const brideRun=getRunning(allB,t);
    const groomRun=getRunning(allG,t);
    const vendorRun=getRunning(allV,t);
    const hasSide=brideNew.length||groomNew.length||vendorNew.length
                 ||brideRun.length||groomRun.length||vendorRun.length;
    const h=rowH(all);

    let inner='';
    if(joint.length&&!hasSide){
      inner=`<div class="span-all">${joint.map(e=>card(e,'joint')).join('')}</div>`;
    } else {
      if(joint.length) inner+=`<div class="span-all">${joint.map(e=>card(e,'joint')).join('')}</div>`;
      inner+=colCell(brideNew,brideRun,'bride');
      inner+=colCell(groomNew,groomRun,'groom');
      inner+=colCell(vendorNew,vendorRun,'vendor');
    }

    html+=`<div class="trow" style="min-height:${h}px">
      <div class="tt">${t}</div>
      <div class="tinner" style="grid-template-columns:1fr 1fr 1fr;">${inner}</div>
    </div>`;
  });
  return html;
}

/* Phase 2: 4-col with continuation stripes */
function rowsP2(evs){
  const g=byTime(evs); let html='';
  const cols=['couple','bm','gm','vendor'];
  const clsMap={couple:'couple',bm:'bm',gm:'gm',vendor:'vendor'};
  const allC={};
  cols.forEach(col=>{allC[col]=evs.filter(e=>[].concat(c2(e)).includes(col));});

  Object.keys(g).sort().forEach(t=>{
    const all=g[t];
    const buckets={couple:[],bm:[],gm:[],vendor:[]};
    all.forEach(e=>[].concat(c2(e)).forEach(col=>{if(buckets[col])buckets[col].push(e);}));
    const h=rowH(all);
    html+=`<div class="trow" style="min-height:${h}px">
      <div class="tt">${t}</div>
      <div class="tinner" style="grid-template-columns:1fr 1fr 1fr 1fr;">
        ${cols.map(col=>colCell(buckets[col],getRunning(allC[col],t),clsMap[col])).join('')}
      </div>
    </div>`;
  });
  return html;
}

/* Phase 3: 2-col with continuation stripes */
function rowsP3(evs){
  const g=byTime(evs); let html='';
  const allC={couple:evs.filter(e=>c3(e)==='couple'),
              prog:evs.filter(e=>c3(e)==='prog')};
  Object.keys(g).sort().forEach(t=>{
    const all=g[t];
    const buckets={couple:[],prog:[],span:[]};
    all.forEach(e=>buckets[c3(e)]&&buckets[c3(e)].push(e));
    const h=rowH(all);
    if(buckets.span.length){
      // Full-width row — e.g. "clear venue"
      html+=`<div class="trow" style="min-height:${h}px">
        <div class="tt">${t}</div>
        <div class="tinner" style="grid-template-columns:1fr 1fr;">
          <div style="grid-column:1/-1;height:100%;">${buckets.span.map(e=>card(e,'joint')).join('')}</div>
        </div>
      </div>`;
    } else {
      html+=`<div class="trow" style="min-height:${h}px">
        <div class="tt">${t}</div>
        <div class="tinner" style="grid-template-columns:1fr 1fr;">
          ${colCell(buckets.couple,getRunning(allC.couple,t),'couple')}
          ${colCell(buckets.prog,getRunning(allC.prog,t),'prog')}
        </div>
      </div>`;
    }
  });
  return html;
}

/* ── PHASE WRAPPER ──────────────────────────────────── */
function phase(num,title,sub,colDefs,rows){
  const chGrid=`grid-template-columns:${colDefs.map(()=>'1fr').join(' ')};`;
  const heads=colDefs.map(c=>`<div class="ch ${c.cls}">${c.label}</div>`).join('');
  return`<div class="phase">
    <div class="phase-hd">
      <div class="phase-num">Part ${num}</div>
      <div class="phase-title">${title}</div>
      <div class="phase-sub">${sub}</div>
    </div>
    <div class="phase-divider"></div>
    <div class="col-header-row">
      <div class="ch-spacer"></div>
      <div class="ch-grid" style="${chGrid}">${heads}</div>
    </div>
    ${rows}
  </div>`;
}

/* ── RENDER ─────────────────────────────────────────── */
// ── Pre-assign alternating shades by time-slot per column ───────────────────
// All events sharing a start time in the same column get the same shade.
// Each successive distinct start-time flips the shade.
// This makes consecutive visible events always alternate, regardless of
// how many events happen to overlap at the same moment.
(function preAlt(){
  const all=DATA.filter(r=>r.date==='2026-07-05'&&r.start);

  // Separate main events (no running event in column at their start time) from
  // indented events (start while another event is already running in same column).
  // Each track gets its OWN alternation sequence so main events never share a
  // shade with main events just because an indented event sat between them.
  function assignCol(evs){
    // Sort by start time (stable — preserves DATA order for same-start events)
    const sorted=evs.slice().sort((a,b)=>toMin(a.start)-toMin(b.start));

    // Two independent counters: main (no running event behind it) vs
    // indent (overlaps a running event). Each event gets its OWN index
    // so two cards stacked at the same time still alternate with each other.
    let mainN=0, indN=0;
    sorted.forEach(ev=>{
      const tMin=toMin(ev.start);
      const behind=sorted.some(e=>toMin(e.start)<tMin&&e.end&&toMin(e.end)>tMin);
      _evAlt.set(ev, (behind ? indN++ : mainN++) % 2 ? ' alt' : '');
    });
  }
  // Phase 1
  ['bride','groom','vendor','joint'].forEach(cls=>
    assignCol(all.filter(r=>r.start<='08:01').filter(e=>c1(e)===cls)));
  // Phase 2
  const p2=all.filter(r=>r.start>'08:01'&&r.start<'12:29');
  ['couple','bm','gm','vendor'].forEach(cls=>
    assignCol(p2.filter(e=>[].concat(c2(e)).includes(cls))));
  // Phase 3
  const p3=all.filter(r=>r.start>='12:29');
  // couple includes bingo/activities; span (clear venue) also gets couple alt
  ['couple','prog'].forEach(cls=>
    assignCol(p3.filter(e=>c3(e)===cls)));
  assignCol(p3.filter(e=>c3(e)==='span')); // clear venue
})();

const d5=DATA.filter(r=>r.date==='2026-07-05'&&r.start);

document.getElementById('root').innerHTML=
  phase(1,
    'Morning Prep &amp; Gatecrash',

     {label:'🤵 Groom &amp; Groomsmen',cls:'groom'},
     {label:'🎨 Hair, Makeup &amp; Vendors',cls:'vendor'}],
    rowsP1(d5.filter(r=>r.start<='08:01')))

  +phase(2,
    'Hotel: Setup, Ceremonies &amp; Prep',
    'Everyone at St Regis · Couple: photos, tea ceremony, outfit changes, solemnization · Bridal party runs stations &amp; receives vendors',
    [{label:'💑 Bride &amp; Groom',cls:'couple'},
     {label:'💐 Bridesmaids',cls:'bm'},
     {label:'🎩 Groomsmen',cls:'gm'},
     {label:'🏢 Vendors &amp; Setup',cls:'vendor'}],
    rowsP2(d5.filter(r=>r.start>'08:01'&&r.start<'12:29')))

  +phase(3,
    'Banquet',
    'St Regis Ballroom · 7-course dinner · Couple steps out between courses for outfit changes',
    [{label:'💑 Bride &amp; Groom &amp; Activities',cls:'couple'},
     {label:'🍽️ Food &amp; Program',cls:'prog'}],
    rowsP3(d5.filter(r=>r.start>='12:29')));
</script>
